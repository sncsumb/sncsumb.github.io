<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Page</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Overlock:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sorts+Mill+Goudy:ital@0;1&display=swap" rel="stylesheet">
    <!-- CSS Style -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main>
         <!-- Navigation Area -->
         <div class="nav-section">
            <img src="images/deadlock_logo_hori.png">
            <nav>
                <a href="index.html" class="active">HEROES</a>
                <a href="credits.html">CREDITS</a>
            </nav>
         </div>
         
        <!-- Hero Header -->
        <div class="hero-header-container">

            <div id="hero-name-container">
                <div id="hero-image-icon"></div>
                <h1 id="hero-name"></h1>
            </div>

            <!-- Contains Role and/or Playstyle and/or Hideout description -->
            <div class="subtitle" id="hero-subtitle">
                <div id="hero-role"></div>
                <div id="hero-playstyle"></div>
                <div id="hero-hideout"></div>
                <!-- Tags -->
                <div id="hero-gun-play-tag">
                    <div class="tag-decor" id="hero-gun-tag"></div>
                    <div class="tag-decor" id="hero-type-tag"></div>
                </div>

            </div>
        </div>

        <!-- Hero Introduction -->
         <div class="hero-introduction-container">
            <div class="hero-intro-subcon">
                <!-- Hero Lore -->
                <div class="hero-lore-container">
                    <div>
                        <h1 class="section-title">LORE</h1>
                        <div id="lore-text" class="subtitle"></div>
                        <div id="hero-desc-tag"></div>
                    </div>    
                </div>
            </div>    
            <!-- Hero Art -->
            <div id="hero-art"></div>
         </div>

    </main>

    <script src="js/hero-script.js"></script>
    
    <!-- Footer -->
</body>
</html>
