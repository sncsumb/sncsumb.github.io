<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Fonts -->
     <link href="https://fonts.googleapis.com/css2?family=Over+the+Rainbow&display=swap" rel="stylesheet">
     <link href="https://fonts.googleapis.com/css2?family=Numans&display=swap" rel="stylesheet">
     <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">
     <!-- Style -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link href="css/style.css" rel="stylesheet">
    <title> Sign Up Page </title>
</head>
    <body>
        <main>
            <h1> Sign Up Form </h1>
            <div class="container" id="form-text" class="shadow p-3 mb-5 bg-white rounded">
                <div class="row">
                    <div class="col">
                        <form action="welcome.html" id="signupForm">
                            first name:<input type="text" name="fName" class="input-area"><br>
                            last name: <input type="text" name="lName"class="input-area"><br>
                            <div id="gender-form">
                                Gender:
                                <input type="radio" name="gender" value="m" id="gender-form">Male
                                <input type="radio" name="gender" value="f">Female<br>
                            </div> 
                            zip code: <input type="text" id="zip" name="zip" class="input-area"><br>
                            city: <span id="city"></span> <br>
                            latitude: <span id="latitude"></span><br>
                            longitude: <span id="longitude"></span><br><br>
                            <div id="drop-down">
                                state:
                                <select id="state" name="state" class="input-area">
                                    <option>Select One</option>
                                    <option value="ca">California</option>
                                    <option value="ny">New York</option>
                                    <option value="tx">Texas</option>
                                </select> <br>
                                select a county: <select id="county" class="input-area"><option>Select One</option></select><br>
                            </div>    
                            desired username: <input type="text" id="username" name="username" class="input-area"><br>
                            <span id="usernameError"></span><br>
                            password: <input type="password" id="password" name="password" class="input-area"><br>
                            <span id="suggestedPwd"></span><br>
                            type password again: <input type="password" id="retypePwd" name="retypePwd" class="input-area"><br>
                            <span id="passwordError"></span>
                            <input type="submit" value="sign up!" id="button">
                            <footer id="text-form">
                                NGO 2026 (c) | CSUMB | LAB 3
                            </footer> 
                        </form> 
                    </div>
                </div>   
            </div>
        </main>

        <script src="js/script.js"></script>
    </body>
</html>
